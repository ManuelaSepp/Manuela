const BLATT_ORDER = [
  '0_Adressänderungen',
  '1_Begrüßung',
  '2_Ansprechpartner',
  '3_Lebendbilder',
  '4_Einleitung',
  '5_Aktuelle_Situation',
  '6_Besonderheiten',
  '7_Kleidung',
  '8_Erinnerungen_Bilder',
  '9_Wassermethode',
  '10_Kommunikation',
  '11_Infekte'
];

function blattSortIndex(blatt) {
  const index = BLATT_ORDER.indexOf(String(blatt || ''));
  return index >= 0 ? index : 999;
}

const karten = BASIS.karten
  .filter(k => String(k.status || '').toLowerCase() !== 'löschen')
  .sort((a,b) => blattSortIndex(a.blatt) - blattSortIndex(b.blatt) || (Number(a.reihenfolge)||0) - (Number(b.reihenfolge)||0));

const byId = Object.fromEntries(karten.map(k => [k.id, k]));
const byBlatt = groupBy(karten, k => k.blatt);

function groupBy(arr, fn) {
  return arr.reduce((acc, item) => {
    const key = fn(item) || 'Sonstiges';
    (acc[key] ||= []).push(item);
    return acc;
  }, {});
}

function niceBlatt(blatt) {
  return String(blatt).replace(/^\d+_?/, '').replaceAll('_', ' ');
}

function labelForGroup(satzgruppe) {
  const map = {
    begruessung:'Begrüßung',

    mehrlingssituation:'Mehrlingssituation',
    familienstruktur:'Familienstruktur',
    aktuelle_situation_status:'Aktuelle Lage',
    besonderheiten_status:'Status',
    besonderheiten_liste:'Besonderheiten',
    kleidung:'Kleidung',
    eltern_bringen_mit:'Eltern bringen mit',
    bilder_familie:'Familienbilder',
    bilder_unklar:'Unklarheiten',
    bilder_zeitfenster:'Zeitfenster',
    bildbezug:'Bildbezug',
    wassermethode_hinweis:'Hinweise',

  return map[satzgruppe] || String(satzgruppe || 'Auswahl').replaceAll('_',' ');
}

function controlNameFor(k) {
  return 'ctrl_' + k.satzgruppe;
}

function isControlOnly(k) {
  return ['steuerwert','regel','hinweis','vorschlag'].includes(k.ausgabeart);
}

function selectForGroup(group, items, placeholder) {
  const sel = document.createElement('select');
  sel.dataset.group = group;
  const empty = document.createElement('option');
  empty.value = '';
  empty.textContent = placeholder || '– bitte auswählen –';
  sel.appendChild(empty);
  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.id;
    opt.textContent = item.anzeige || item.id;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', aktualisieren);
  return sel;
}

function render() {
  document.getElementById('profilInfo').innerText = `${BASIS.profil} / ${BASIS.exportiertAm}`;
  const root = document.getElementById('kartenbereich');
  root.innerHTML = '';

  Object.entries(byBlatt).forEach(([blatt, items], index) => {
    const details = document.createElement('details');
    details.className = 'card';
    details.dataset.blatt = blatt;

    const summary = document.createElement('summary');
    summary.innerHTML = `<span>${niceBlatt(blatt)}</span><span class="toggle-hint">öffnen</span>`;
    details.appendChild(summary);

    const content = document.createElement('div');
    content.className = 'content';
    if (blatt === '0_Adressänderungen') {
      renderAdresseSpezial(items, content);
      const closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'card-close-bottom';
      closeBtn.textContent = 'Karte schließen';
      closeBtn.addEventListener('click', () => {
        details.open = false;
        const hint = details.querySelector('.toggle-hint');
        if (hint) hint.innerText = 'öffnen';
        details.scrollIntoView({behavior:'smooth', block:'start'});
      });
      content.appendChild(closeBtn);
      details.appendChild(content);
      root.appendChild(details);
      return;
    }

    if (blatt === '3_Lebendbilder') {
      renderLebendbilderSpezial(items, content);
      const closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'card-close-bottom';
      closeBtn.textContent = 'Karte schließen';
      closeBtn.addEventListener('click', () => {
        details.open = false;
        const hint = details.querySelector('.toggle-hint');
        if (hint) hint.innerText = 'öffnen';
        details.scrollIntoView({behavior:'smooth', block:'start'});
      });
      content.appendChild(closeBtn);
      details.appendChild(content);
      root.appendChild(details);
      return;
    }


    const visible = items.filter(k => !['Regel'].includes(k.typ));
    const grouped = groupBy(visible, k => k.satzgruppe || k.bereich || k.blatt);

    Object.entries(grouped).forEach(([satzgruppe, groupItems]) => {
      const typSet = new Set(groupItems.map(k => k.typ));
      const field = document.createElement('div');
      field.className = 'field';
      const title = document.createElement('label');
      title.className = 'field-title';
      title.textContent = labelForGroup(satzgruppe);
      field.appendChild(title);

      if (typSet.has('Dropdown') && groupItems.some(k => k.typ === 'Dropdown')) {
        const select = document.createElement('select');
        select.id = controlNameFor(groupItems[0]);
        select.dataset.satzgruppe = satzgruppe;
        select.dataset.blatt = blatt;
        select.innerHTML = `<option value="">– bitte auswählen –</option>`;
        groupItems.filter(k => k.typ === 'Dropdown').forEach(k => {
          if (k.id === 'besonderheiten_vorhanden') return;
          const opt = document.createElement('option');
          opt.value = k.id;
          opt.textContent = k.anzeige || k.id;
          opt.title = k.hinweis || k.logik || '';
          select.appendChild(opt);
        });
        field.appendChild(select);
      }

      const radios = groupItems.filter(k => k.typ === 'Radio');
      if (radios.length) {
        const wrap = document.createElement('div');
        wrap.className = 'options';
        radios.forEach((k, idx) => {
          const lab = optionLabel(k, 'radio', controlNameFor(k), satzgruppe === 'mehrlingsstatus' && idx === 0);
          wrap.appendChild(lab);
        });
        field.appendChild(wrap);
      }

      const checks = groupItems.filter(k => k.typ === 'Checkbox' || k.typ === 'Vorlage');
      if (checks.length) {
        const wrap = document.createElement('div');
        wrap.className = 'options';
        checks.forEach(k => wrap.appendChild(optionLabel(k, 'checkbox', k.id)));
        field.appendChild(wrap);
      }

      const inputs = groupItems.filter(k => ['Eingabefeld','Freitext'].includes(k.typ));
      inputs.forEach(k => {
        const inp = document.createElement(k.typ === 'Freitext' ? 'textarea' : 'input');
        inp.id = k.id;
        if (k.typ !== 'Freitext') inp.type = 'text';
        inp.placeholder = k.anzeige || '';
        inp.dataset.satzgruppe = k.satzgruppe || '';
        field.appendChild(inp);
        if (k.hinweis || k.logik) {
          const h = document.createElement('div');
          h.className = 'hint';
          h.textContent = k.hinweis || k.logik;
          field.appendChild(h);
        }
      });

      const hinweise = groupItems.filter(k => k.typ === 'Hinweis');
      hinweise.forEach(k => {
        const p = document.createElement('div');
        p.className = 'hint';
        p.innerHTML = `<span class="warn">Hinweis:</span> ${escapeHtml(k.anzeige)}`;
        if (k.hinweis) p.innerHTML += `<br>${escapeHtml(k.hinweis)}`;
        field.appendChild(p);
      });

      content.appendChild(field);
    });


    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'card-close-bottom';
    closeBtn.textContent = 'Karte schließen';
    closeBtn.addEventListener('click', () => {
      details.open = false;
      const hint = details.querySelector('.toggle-hint');
      if (hint) hint.innerText = 'öffnen';
      details.scrollIntoView({behavior:'smooth', block:'start'});
    });
    content.appendChild(closeBtn);

    details.appendChild(content);
    root.appendChild(details);
  });

  document.querySelectorAll('details.card').forEach(card => {
    card.addEventListener('toggle', () => {
      const hint = card.querySelector('.toggle-hint');
      if (hint) hint.innerText = card.open ? 'schließen' : 'öffnen';
    });
  });
}

function optionLabel(k, type, name, checked=false) {
  const lab = document.createElement('label');
  lab.className = 'option';
  const input = document.createElement('input');
  input.type = type;
  input.name = type === 'radio' ? name : k.id;
  input.id = k.id;
  input.value = k.id;
  input.dataset.satzgruppe = k.satzgruppe || '';
  input.dataset.blatt = k.blatt || '';
  if (checked) input.checked = true;
  lab.appendChild(input);
  const span = document.createElement('span');
  span.innerHTML = escapeHtml(k.anzeige || k.id);
  if (k.hinweis) span.innerHTML += `<div class="hint">${escapeHtml(k.hinweis)}</div>`;
  lab.appendChild(span);
  return lab;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

// =========================================================
// Werte lesen
// =========================================================
function selectedIds() {
  const ids = [];
  document.querySelectorAll('select').forEach(sel => { if (sel.value) ids.push(sel.value); });
  document.querySelectorAll('input[type="checkbox"]:checked,input[type="radio"]:checked').forEach(inp => { if (inp.value) ids.push(inp.value); });
  return ids;
}

function selectedEntries() {
  return selectedIds().map(id => byId[id]).filter(Boolean);
}

function selectedByGroup(gruppe) {
  return selectedEntries().find(k => k.satzgruppe === gruppe);
}

function selectedAllByGroup(gruppe) {
  return selectedEntries().filter(k => k.satzgruppe === gruppe);
}

function inputValue(id) {
  return (document.getElementById(id)?.value || '').trim();
}

function clean(text) {
  return String(text || '').trim().replace(/\s+/g,' ').replace(/\.$/,'');
}

function withDot(text) {
  const t = String(text || '').trim();
  if (!t) return '';
  return /[.!?]$/.test(t) ? t : t + '.';
}

function pushIf(parts, text) {
  const t = String(text || '').trim();
  if (t) parts.push(t);
}

function kindNummer(id) {
  return {
    erstes_kind:1, zweites_kind:2, drittes_kind:3, viertes_kind:4,
    fuenftes_kind:5, sechstes_kind:6, siebtes_kind:7
  }[id] || null;
}

function handNummer(id) {
  return {
    keine_kinder_hand:0, ein_kind_hand:1, zwei_kinder_hand:2, drei_kinder_hand:3,
    vier_kinder_hand:4, fuenf_kinder_hand:5, sechs_kinder_hand:6, sieben_kinder_hand:7
  }[id] ?? null;
}

function updateKinderHandOptions() {
  const kind = selectedByGroup('kindfolge');
  const select = document.querySelector('select[data-satzgruppe="kinder_an_der_hand"]');
  if (!select) return;
  const n = kindNummer(kind?.id);
  [...select.options].forEach(opt => {
    if (!opt.value || !n) { opt.disabled = false; return; }
    const h = handNummer(opt.value);
    opt.disabled = h > Math.max(0, n - 1);
  });
  if (select.selectedOptions[0]?.disabled) select.value = '';
}


function updateMehrlingsSituationOptions() {
  const status = selectedByGroup('mehrlingsstatus');
  const statusId = status?.id || 'einling';
  const situationInputs = [...document.querySelectorAll('input[data-satzgruppe="mehrlingssituation"]')];

  situationInputs.forEach(inp => {
    const lab = inp.closest('label');
    let sichtbar = false;

    if (statusId === 'zwillinge') {
      sichtbar = inp.id.startsWith('zwillinge_');
    } else if (statusId === 'drillinge' || statusId === 'mehrlinge') {
      sichtbar = inp.id === 'mehrlinge_unterschiedliche_situation';
    }

    inp.disabled = !sichtbar;
    if (!sichtbar) inp.checked = false;
    if (lab) lab.classList.toggle('hidden', !sichtbar);
  });

  const field = situationInputs[0]?.closest('.field');
  if (field) field.classList.toggle('hidden', statusId === 'einling' || situationInputs.every(inp => inp.disabled));
}

function baueFamiliensatz(verbraucht) {
  const kind = selectedByGroup('kindfolge');
  const hand = selectedByGroup('kinder_an_der_hand');
  if (!kind && !hand) return '';

  if (kind) verbraucht.add(kind.id);
  if (hand) verbraucht.add(hand.id);

  const kindText = clean(kind?.bericht || '');
  const handText = clean(hand?.bericht || '');

  if (kindText && handText) {
    if (hand?.id === 'keine_kinder_hand') {
      return `${kindText}, die Eltern haben jedoch keine Kinder an der Hand.`;
    }
    return `${kindText}, die Eltern haben ${handText} an der Hand.`;
  }

  if (kindText) return withDot(kindText);
  if (handText) return `Die Eltern haben ${handText} an der Hand.`;
  return '';
}

function artikelUndAdjektiv(rolleId, beschreibung) {
  const fem = ['mama','oma','freundin','hebamme','schwester','aerztin','seelsorgerin'];
  const masc = ['papa','arzt','seelsorger'];
  const plural = [];
  if (!beschreibung) {
    if (fem.includes(rolleId)) return 'die';
    if (masc.includes(rolleId)) return 'den';
    return '';
  }
  if (fem.includes(rolleId)) return 'die ' + beschreibung + 'e';
  if (masc.includes(rolleId)) return 'den ' + beschreibung + 'en';
  return 'den ' + beschreibung + 'en';
}

function baueAnsprechpartner(verbraucht) {
  const rolle = selectedByGroup('ansprechpartner_rolle');
  const beschr = selectedByGroup('ansprechpartner_beschreibung');
  const art = selectedByGroup('ansprechpartner_gespraechsart');

  if (!rolle && !art) return '';

  [rolle,beschr,art].filter(Boolean).forEach(k => verbraucht.add(k.id));

  const rolleId = rolle?.id || '';
  const adj = beschr && beschr.id !== 'keine_beschreibung'
    ? clean(beschr.bericht || beschr.anzeige || '')
    : '';

  let name = capitalise(inputValue('ansprechpartner_name'));

  const rollenGrammatik = {
    papa:                 { artikel: 'dem',   adjEndung: 'en', nomen: 'Papa',                 dr: false },
    mama:                 { artikel: 'der',   adjEndung: 'en', nomen: 'Mama',                 dr: false },
    oma:                  { artikel: 'der',   adjEndung: 'en', nomen: 'Oma',                  dr: false },
    freundin:             { artikel: 'der',   adjEndung: 'en', nomen: 'Freundin',             dr: false },
    familienangehoeriger: { artikel: 'einem', adjEndung: 'en', nomen: 'Familienangehörigen',  dr: false },
    hebamme:              { artikel: 'der',   adjEndung: 'en', nomen: 'Hebamme',              dr: false },
    schwester:            { artikel: 'der',   adjEndung: 'en', nomen: 'Schwester',            dr: false },
    aerztin:              { artikel: 'der',   adjEndung: 'en', nomen: 'Ärztin',               dr: true  },
    arzt:                 { artikel: 'dem',   adjEndung: 'en', nomen: 'Arzt',                 dr: true  },
    seelsorgerin:         { artikel: 'der',   adjEndung: 'en', nomen: 'Frau',                 dr: false, zusatz: 'von der Seelsorge' },
    seelsorger:           { artikel: 'dem',   adjEndung: 'en', nomen: 'Herrn',                dr: false, zusatz: 'von der Seelsorge' }
  };

  function adjTeil(regel) {
    return adj ? adj + regel.adjEndung + ' ' : '';
  }

  let person = '';

  if (rolleId === 'sozialdienst') {
    person = adj
      ? 'jemandem ' + adj + 'en vom Sozialdienst'
      : 'jemandem vom Sozialdienst';
  } else if (rollenGrammatik[rolleId]) {
    const regel = rollenGrammatik[rolleId];

    if (regel.dr && name && !/^Dr\./i.test(name)) {
      name = 'Dr. ' + name;
    }

    person = regel.artikel + ' ' + adjTeil(regel) + regel.nomen;

    if (name) person += ' ' + name;
    if (regel.zusatz) person += ' ' + regel.zusatz;

  } else if (rolle) {
    person = clean(rolle.bericht || rolle.anzeige || 'jemandem');
  } else {
    person = 'jemandem';
  }

  let verb = 'gesprochen';
  if (art?.id === 'telefon') verb = 'telefoniert';
  if (art?.id === 'ruecksprache') verb = 'Rücksprache gehalten';

  return `Ich habe mit ${person} ${verb}.`.replace(/\s+/g,' ').trim();
}

function gespraechsartText(id) {
  if (id === 'telefon') return 'am Telefon';
  if (id === 'ruecksprache') return 'zur Rücksprache';

function gespraechsartVerb(id) {

function capitalise(s) {
  if (!s) return '';
  return s.charAt(0).toLocaleUpperCase('de-DE') + s.slice(1);
}


function baueLebendbilder(verbraucht) {
  const teile = [];

  const geburt = selectedByGroup('lebendbilder_geburt');
  const prognose = selectedByGroup('lebendbilder_prognose');

  const ssw = inputValue('ssw');
  const alter = inputValue('alter_zahl');
  const einheit = selectedByGroup('lebendbilder_alter');
  const ergaenzung = inputValue('lebendbilder_ergaenzung');

  if (geburt) verbraucht.add(geburt.id);
  if (prognose) verbraucht.add(prognose.id);
  if (einheit) verbraucht.add(einheit.id);

  const einheitText = einheit && einheit.id !== 'keine_altersangabe'
    ? clean(einheit.bericht || einheit.anzeige || '')
    : '';

  // Neutraler Geburtssatz: keine harte Singularform mehr.
  // Ausgabe erst, wenn echte Werte vorhanden sind.
  if (ssw && alter && einheitText) {
    teile.push(`Die Geburt fand vor ${alter} ${einheitText} in der ${ssw}. SSW statt.`);
  } else if (ssw) {
    teile.push(`Die Geburt fand in der ${ssw}. SSW statt.`);
  } else if (alter && einheitText) {
    teile.push(`Die Geburt fand vor ${alter} ${einheitText} statt.`);
  }

  if (prognose && prognose.bericht) {
    teile.push(clean(prognose.bericht));
  }

  if (ergaenzung) {
    teile.push(ergaenzung);
  }

  return teile.join(' ');
}

function baueListe(statusGroup, listGroup, label, verbraucht) {
  const status = selectedByGroup(statusGroup);
  const liste = selectedAllByGroup(listGroup);
  if (status) verbraucht.add(status.id);
  liste.forEach(k => verbraucht.add(k.id));

  if (status && status.id.includes('keine_')) return status.bericht;
  if (status && status.id.includes('unklar')) return status.bericht;
  if (liste.length) return `${label}:\n- ` + liste.map(k => k.bericht).filter(Boolean).join('\n- ');
  if (status?.bericht && status.ausgabeart === 'direkt') return status.bericht;
  return '';
}

function baueSammelwert(gruppe, prefix, verbraucht) {
  const items = selectedAllByGroup(gruppe).filter(k => k.bericht);
  if (!items.length) return '';
  items.forEach(k => verbraucht.add(k.id));
  const werte = items.map(k => k.bericht);
  return prefix + joinGerman(werte) + '.';
}

function joinGerman(arr) {
  if (arr.length <= 1) return arr[0] || '';
  if (arr.length === 2) return arr[0] + ' und ' + arr[1];
  return arr.slice(0,-1).join(', ') + ' und ' + arr[arr.length-1];
}


function baueBilder(verbraucht) {
  const parts = [];
  const genutzt = new Set();

  const bildbezugEintrag = selectedByGroup('bildbezug');
  if (bildbezugEintrag) verbraucht.add(bildbezugEintrag.id);

  const familie = selectedAllByGroup('bilder_familie');
  const unklar = selectedAllByGroup('bilder_unklar');
  const zeitfenster = selectedAllByGroup('bilder_zeitfenster');

  [...familie, ...unklar, ...zeitfenster].forEach(k => verbraucht.add(k.id));

  const hatGemeinsame =
    familie.some(k => k.id === 'gemeinsame_bilder_gewuenscht') ||
    familie.some(k => k.id === 'gemeinsame_bilder_kind');

  const hatGeschwister = familie.some(k => k.id === 'geschwister_vermutlich');
  const nurHeute = zeitfenster.some(k => k.id === 'bilder_heute');
  const auchMorgen = zeitfenster.some(k => k.id === 'bilder_morgen');
  const geschwisterUnklar = unklar.some(k => k.id === 'geschwister_bilder_unklar');

  // Neutral: kein harter Bezug "mit ihrem Kind" mehr.
  if (hatGemeinsame && hatGeschwister && nurHeute) {
    parts.push('Die Eltern und Geschwister möchten bei den Bildern dabei sein, welche jedoch nur heute möglich sind.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','geschwister_vermutlich','bilder_heute'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && hatGeschwister && auchMorgen) {
    parts.push('Die Eltern und Geschwister möchten bei den Bildern dabei sein, welche auch morgen noch möglich sind.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','geschwister_vermutlich','bilder_morgen'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && geschwisterUnklar && nurHeute) {
    parts.push('Die Eltern möchten bei den Bildern dabei sein, welche jedoch nur heute möglich sind; ob auch Geschwister bei den Bildern dabei sein werden, ist aktuell noch unklar.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','geschwister_bilder_unklar','bilder_heute'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && geschwisterUnklar && auchMorgen) {
    parts.push('Die Eltern möchten bei den Bildern dabei sein, welche auch morgen noch möglich sind; ob auch Geschwister bei den Bildern dabei sein werden, ist aktuell noch unklar.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','geschwister_bilder_unklar','bilder_morgen'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && hatGeschwister) {
    parts.push('Die Eltern und Geschwister möchten bei den Bildern dabei sein.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','geschwister_vermutlich'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && geschwisterUnklar) {
    parts.push('Die Eltern möchten bei den Bildern dabei sein, wobei aktuell noch unklar ist, ob auch Geschwister bei den Bildern dabei sein werden.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','geschwister_bilder_unklar'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && nurHeute) {
    parts.push('Die Eltern möchten bei den Bildern dabei sein, welche jedoch nur heute möglich sind.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','bilder_heute'].forEach(id => genutzt.add(id));
  } else if (hatGemeinsame && auchMorgen) {
    parts.push('Die Eltern möchten bei den Bildern dabei sein, welche auch morgen noch möglich sind.');
    ['gemeinsame_bilder_gewuenscht','gemeinsame_bilder_kind','bilder_morgen'].forEach(id => genutzt.add(id));
  }

  familie.forEach(k => {
    if (genutzt.has(k.id)) return;

    if (k.id === 'gemeinsame_bilder_gewuenscht' || k.id === 'gemeinsame_bilder_kind') {
      parts.push('Die Eltern möchten bei den Bildern dabei sein.');
      return;
    }

    if (k.bericht) parts.push(clean(k.bericht));
  });

  unklar.forEach(k => {
    if (genutzt.has(k.id)) return;
    if (k.bericht) parts.push(clean(k.bericht));
  });

  zeitfenster.forEach(k => {
    if (genutzt.has(k.id)) return;
    if (k.bericht) parts.push(clean(k.bericht));
  });

  return parts.map(withDot).join(' ');
}

function tageText(tage) {
  const t = clean(tage || '');
  if (!t) return '';
  return t === '1' ? '1 Tag' : `${t} Tagen`;
}

function istZukunftsOderHeuteAngabe(text) {
  const t = clean(text).toLowerCase();
  return /\b(heute|morgen|übermorgen|uebermorgen)\b/.test(t);
}

function baueEinleitung(verbraucht) {
  const status = selectedByGroup('einleitung_status');
  const datum = inputValue('einleitung_datum');
  const tage = inputValue('einleitung_tage');

  if (!status && !datum && !tage) return '';
  if (status) verbraucht.add(status.id);

  const tageFormuliert = tageText(tage);

  if (status?.id === 'einleitung_wird') {
    // Zukunft: konkreter Zeitpunkt gewinnt vor Tagefeld. So entstehen keine Sätze wie "morgen ... in 2 Tagen".
    if (datum) return `Die Mutter wird ${datum} zur Einleitung in die Klinik gehen.`;
    if (tageFormuliert) return `Die Mutter wird voraussichtlich in ${tageFormuliert} zur Einleitung in die Klinik gehen.`;
    return status.bericht || 'Die Mutter wird zur Einleitung in die Klinik gehen.';
  }

  if (status?.id === 'einleitung_ist') {
    // Vergangenheit/Gegenwart: Tage gewinnen vor Datum, damit keine Sätze wie "seit morgen, seit 2 Tagen" entstehen.
    if (tageFormuliert) return `Die Mutter befindet sich seit ${tageFormuliert} zur Einleitung in der Klinik.`;
    if (datum && !istZukunftsOderHeuteAngabe(datum)) return `Die Mutter befindet sich seit ${datum} zur Einleitung in der Klinik.`;
    return status.bericht || 'Die Mutter befindet sich zur Einleitung in der Klinik.';
  }

  if (status?.id === 'dauer_unbekannt') {
    return status.bericht || 'Wie lange es bis zur Geburt dauern wird, ist aktuell nicht bekannt.';
  }

  if (datum) return `Einleitungszeitpunkt: ${datum}.`;
  if (tageFormuliert) return `Einleitung seit ${tageFormuliert}.`;
  return '';
}

function baueBericht() {
  updateKinderHandOptions();
  updateMehrlingsSituationOptions();

  const verbraucht = new Set();
  const oben = [];
  const abschnitte = [];

  const begr = selectedByGroup('begruessung');
  if (begr) { verbraucht.add(begr.id); if (begr.bericht) oben.push(begr.bericht); }

  if (lebendbilderGenutzt()) oben.push('HIER GEHT ES UM LEBENDBILDER, ES EILT.');

  // 1 Ansprechpartner
  pushIf(abschnitte, baueAnsprechpartner(verbraucht));

  // 2 Lebendbilder
  pushIf(abschnitte, baueLebendbilder(verbraucht));

  // 3 Einleitung – bewusst nicht mehr stumpf aus allen Feldern zusammensetzen.
  pushIf(abschnitte, baueEinleitung(verbraucht));
  selectedAllByGroup('einleitung_erwartung').forEach(k => {
    verbraucht.add(k.id);
    if (k.ausgabeart === 'direkt') pushIf(abschnitte, k.bericht);
  });
  pushIf(abschnitte, ergaenzungValue('ergaenzung_einleitung'));

  // 4 Aktuelle Situation
  pushIf(abschnitte, baueFamiliensatz(verbraucht));

  selectedAllByGroup('grundsituation').forEach(k => {
    verbraucht.add(k.id);
    if (k.bericht) pushIf(abschnitte, k.bericht);
  });

  const mehrlingsstatus = selectedByGroup('mehrlingsstatus');
  selectedAllByGroup('mehrlingsstatus').forEach(k => verbraucht.add(k.id));
  if (mehrlingsstatus && mehrlingsstatus.id !== 'einling') {
    selectedAllByGroup('mehrlingssituation').forEach(k => {
      verbraucht.add(k.id);
      if (k.bericht) pushIf(abschnitte, k.bericht);
    });
  } else {
    selectedAllByGroup('mehrlingssituation').forEach(k => verbraucht.add(k.id));
  }

  ['familienstruktur','aktuelle_situation_status'].forEach(gruppe => {
    selectedAllByGroup(gruppe).forEach(k => {
      verbraucht.add(k.id);
      if (k.ausgabeart === 'direkt') pushIf(abschnitte, k.bericht);
    });
  });
  pushIf(abschnitte, ergaenzungValue('ergaenzung_aktuelle_situation'));

  // 5 Besonderheiten
  pushIf(abschnitte, baueListe('besonderheiten_status','besonderheiten_liste','Äußerliche Besonderheiten', verbraucht));
  pushIf(abschnitte, ergaenzungValue('ergaenzung_besonderheiten'));

  // 6 Kleidung
  selectedAllByGroup('kleidung').forEach(k => {
    verbraucht.add(k.id);
    if (k.ausgabeart === 'direkt') pushIf(abschnitte, k.bericht);
  });
  pushIf(abschnitte, baueSammelwert('eltern_bringen_mit', 'Die Eltern bringen ', verbraucht));
  pushIf(abschnitte, ergaenzungValue('ergaenzung_kleidung'));

  // 7 Bilder
  pushIf(abschnitte, baueBilder(verbraucht));
  pushIf(abschnitte, ergaenzungValue('ergaenzung_bilder'));

  // 8 Wassermethode
  ['wassermethode_status','wassermethode_zusatz'].forEach(gruppe => {
    selectedAllByGroup(gruppe).forEach(k => {
      verbraucht.add(k.id);
      if (k.ausgabeart === 'direkt') pushIf(abschnitte, k.bericht);
    });
  });
  pushIf(abschnitte, ergaenzungValue('ergaenzung_wassermethode'));

  // 9 Kommunikation
  selectedAllByGroup('kommunikation_sprache').forEach(k => {
    verbraucht.add(k.id);
    if (k.ausgabeart === 'direkt') pushIf(abschnitte, k.bericht);
  });
  pushIf(abschnitte, ergaenzungValue('ergaenzung_kommunikation'));

  // 10 Infekte
  pushIf(abschnitte, baueListe('infekte_status','infekte_liste','Infekte', verbraucht));
  pushIf(abschnitte, ergaenzungValue('ergaenzung_infekte'));

  const frage = selectedByGroup('abschlussfrage');
  if (frage) verbraucht.add(frage.id);

  const gruss = selectedByGroup('grussformel');
  if (gruss) verbraucht.add(gruss.id);

  selectedEntries().forEach(k => {
    if (verbraucht.has(k.id)) return;
    if (k.ausgabeart === 'direkt' && k.bericht) {
      verbraucht.add(k.id);
      pushIf(abschnitte, k.bericht);
    }
  });

  if (frage?.bericht) abschnitte.push(frage.bericht);

  if (gruss?.bericht) {
    const grussName = inputValue('gruss_Name');
    abschnitte.push(grussName ? `${gruss.bericht} ${capitalise(grussName)}` : gruss.bericht);
  }

  // Adressdaten gehören wirklich ganz ans Ende – nach Abschlussfrage und Grußformel.
  pushIf(abschnitte, baueAdressblock(verbraucht));

  const text = [...oben, ...abschnitte].filter(Boolean).join('\n\n');
  document.getElementById('debugInfo').innerText = `${selectedIds().length} Auswahl(en), ${verbraucht.size} verarbeitet`;
  return text;
}


function applyExcludeLogik() {
  // Erst alles wieder freigeben
  document.querySelectorAll('input[type="checkbox"], input[type="radio"], select option').forEach(el => {
    el.disabled = false;
    if (el.closest) el.closest('.option')?.classList.remove('disabled-option');
  });

  selectedEntries().forEach(item => {
    const logik = String(item.logik || '');
    const matches = [...logik.matchAll(/exclude:([^;]+)/g)];

    matches.forEach(match => {
      const alias = {
        eltern_unklar: 'eltern_bilder_unklar'
      };
      const ids = match[1].split(',')
        .map(x => x.trim())
        .filter(Boolean)
        .map(id => alias[id] || id);

      ids.forEach(id => {
        const target = document.getElementById(id);

        if (target) {
          if (target.type === 'checkbox' || target.type === 'radio') {
            target.checked = false;
            target.disabled = true;
            target.closest('.option')?.classList.add('disabled-option');
          } else {
            target.disabled = true;
          }
        }

        // Falls es eine Select-Option ist
        document.querySelectorAll(`select option[value="${CSS.escape(id)}"]`).forEach(opt => {
          opt.selected = false;
          opt.disabled = true;
        });
      });
    });
  });
}

function aktualisieren() {

<script>
/* === UX-Update: Accordion, Kartenfarben, Sperrlogik === */
(function () {
  function cardTitle(card) {
    const s = card.querySelector('summary');
    return (s ? s.textContent : '').toLowerCase();
  }

  function findCardByBlatt(blatt) {
    return Array.from(document.querySelectorAll('.card')).find(card => card.dataset.blatt === blatt);
  }

  function inputHasRealUserValue(el) {
    if (!el || el.disabled || el.type === 'hidden') return false;

    if (el.type === 'radio') {
      if (!el.checked) return false;
      // Defaultwert "Ein Kind" soll Aktuelle Situation nicht sofort als bearbeitet markieren.
      if (el.id === 'einling') return false;
      return true;
    }

    if (el.type === 'checkbox') return !!el.checked;

    if (el.tagName === 'SELECT') {
      return !!el.value && el.value.trim() !== '';
    }

    return !!el.value && el.value.trim() !== '';
  }

  function cardHasValues(card) {
    return Array.from(card.querySelectorAll('input, select, textarea')).some(inputHasRealUserValue);
  }

  function updateCardStates() {
    document.querySelectorAll('.card').forEach(card => {
      if (card.hasAttribute('open')) {
        card.classList.remove('card-empty', 'card-complete');
        return;
      }
      const complete = cardHasValues(card);
      card.classList.toggle('card-complete', complete);
      card.classList.toggle('card-empty', !complete);
    });
  }

  function closeOtherCards(currentCard) {
    document.querySelectorAll('.card').forEach(card => {
      if (card !== currentCard && card.hasAttribute('open')) {
        card.removeAttribute('open');
        const hint = card.querySelector('.toggle-hint');
        if (hint) hint.innerText = 'öffnen';
      }
    });
    updateCardStates();
  }

  function ensureHint(card, text) {
    if (!card) return;
    let hint = card.querySelector('.card-lock-hint');
    if (!hint) {
      hint = document.createElement('div');
      hint.className = 'card-lock-hint';
      const content = card.querySelector('.content') || card;
      content.prepend(hint);
    }
    hint.textContent = text;
  }

  function clearHint(card) {
    if (!card) return;
    const hint = card.querySelector('.card-lock-hint');
    if (hint) hint.remove();
  }

  function setCardDisabled(card, disabled, hintText) {
    if (!card) return;
    card.classList.toggle('card-disabled', disabled);
    if (disabled) {
      card.removeAttribute('open');
      const hint = card.querySelector('.toggle-hint');
      if (hint) hint.innerText = 'gesperrt';
      ensureHint(card, hintText);
    } else {
      const hint = card.querySelector('.toggle-hint');
      if (hint) hint.innerText = card.hasAttribute('open') ? 'schließen' : 'öffnen';
      clearHint(card);
    }
  }

  function updateLebendbilderEinleitungLock() {
    const lebend = findCardByBlatt('3_Lebendbilder');
    const einleitung = findCardByBlatt('4_Einleitung');
    if (!lebend || !einleitung) return;

    const lebendAktiv = cardHasValues(lebend);
    const einleitungAktiv = cardHasValues(einleitung);

    if (lebendAktiv && !einleitungAktiv) {
      setCardDisabled(einleitung, true, 'Lebendbilder aktiv – Einleitung derzeit ausgeblendet.');
      setCardDisabled(lebend, false);
    } else if (einleitungAktiv && !lebendAktiv) {
      setCardDisabled(lebend, true, 'Einleitung aktiv – Lebendbilder derzeit ausgeblendet.');
      setCardDisabled(einleitung, false);
    } else {
      setCardDisabled(lebend, false);
      setCardDisabled(einleitung, false);
    }
  }

  function initUxUpdate() {
    document.querySelectorAll('.card summary').forEach(summary => {
      summary.addEventListener('click', () => {
        const current = summary.parentElement;
        setTimeout(() => closeOtherCards(current), 0);
      });
    });

    document.addEventListener('input', () => {
      updateCardStates();
      updateLebendbilderEinleitungLock();
    });

    document.addEventListener('change', () => {
      updateCardStates();
      updateLebendbilderEinleitungLock();
    });

    updateCardStates();
    updateLebendbilderEinleitungLock();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(initUxUpdate, 200));
  } else {
    setTimeout(initUxUpdate, 200);
  }
})();
</script>


<script>
/* Nur geschlossene Kartenfläche öffnen – ohne Buttons/Inputs zu stören */
document.addEventListener('click', function(event) {
  const card = event.target.closest('details.card');
  if (!card || card.open) return;
  if (event.target.closest('summary, button, input, select, textarea, label, a')) return;

  card.open = true;
  const hint = card.querySelector('.toggle-hint');
  if (hint) hint.innerText = 'schließen';

  document.querySelectorAll('details.card[open]').forEach(other => {
    if (other !== card) {
      other.removeAttribute('open');
      const otherHint = other.querySelector('.toggle-hint');
      if (otherHint) otherHint.innerText = 'öffnen';
    }
  });
});
</script>




<script>
/* === Mini-Fix: Kartenstatus beim Schließen ohne Default-Einling === */
(function(){
  function isReallyVisible(el) {
    if (!el) return false;
    if (el.type === 'hidden') return false;
    if (el.closest('.hidden')) return false;
    if (el.closest('[hidden]')) return false;
    const label = el.closest('label');
    if (label && label.classList.contains('hidden')) return false;
    return true;
  }

  function selectHasValue(select) {
    const value = String(select.value || '').trim();
    const text = String(select.options[select.selectedIndex]?.textContent || '').trim().toLowerCase();

    if (!value) return false;
    if (value.startsWith('keine_')) return false;
    if (text.includes('bitte auswählen')) return false;
    if (text.startsWith('keine ') || text.startsWith('kein ')) return false;

    return true;
  }

  function fieldHasValue(field) {
    if (!field || field.disabled || !isReallyVisible(field)) return false;

    if (field.type === 'radio') {
      if (!field.checked) return false;

      // Wichtig: Standardwert in "Aktuelle Situation" darf die Karte nicht grün machen.
      if (field.id === 'einling') return false;

      return true;
    }

    if (field.type === 'checkbox') {
      return !!field.checked;
    }

    if (field.tagName === 'SELECT') {
      return selectHasValue(field);
    }

    return String(field.value || '').trim() !== '';
  }

  function cardHasRealValue(card) {
    return Array.from(card.querySelectorAll('input, select, textarea')).some(fieldHasValue);
  }

  function refreshCard(card) {
    if (!card || !card.classList || !card.classList.contains('card')) return;

    card.classList.remove('card-empty', 'card-complete');

    if (cardHasRealValue(card)) {
      card.classList.add('card-complete');
    } else {
      card.classList.add('card-empty');
    }
  }

  function refreshFromEvent(ev) {
    const card = ev.target.closest && ev.target.closest('.card');
    if (!card) return;
    refreshCard(card);
    requestAnimationFrame(function(){ refreshCard(card); });
  }

  document.addEventListener('input', refreshFromEvent, true);
  document.addEventListener('change', refreshFromEvent, true);

  document.addEventListener('toggle', function(ev){
    const card = ev.target;
    if (!card || !card.classList || !card.classList.contains('card')) return;
    refreshCard(card);
    requestAnimationFrame(function(){ refreshCard(card); });
    setTimeout(function(){ refreshCard(card); }, 80);
  }, true);

  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', function(){
      setTimeout(function(){
        document.querySelectorAll('.card').forEach(function(card){
          card.removeAttribute('open');
          refreshCard(card);
        });
      }, 140);
    });
  }

  window.addEventListener('load', function(){
    setTimeout(function(){
      document.querySelectorAll('.card').forEach(refreshCard);
    }, 250);
  });
})();
</script>


<script>
/* === FINAL: Reset-Fix für Lebendbilder/Einleitung nach Eingaben löschen === */
(function(){
  function findCard(blatt) {
    return document.querySelector('.card[data-blatt="' + blatt + '"]');
  }

  function unlockCard(card) {
    if (!card) return;

    card.classList.remove('card-disabled');
    card.removeAttribute('disabled');

    const lockHint = card.querySelector('.card-lock-hint');
    if (lockHint) lockHint.remove();

    const toggleHint = card.querySelector('.toggle-hint');
    if (toggleHint) {
      toggleHint.innerText = card.hasAttribute('open') ? 'schließen' : 'öffnen';
    }
  }

  function cardHasRealValue(card) {
    if (!card) return false;

    const fields = card.querySelectorAll('input, textarea, select');

    for (const field of fields) {
      if (field.disabled || field.type === 'hidden') continue;
      if (field.closest('.hidden') || field.closest('[hidden]')) continue;

      if (field.type === 'checkbox') {
        if (field.checked) return true;
        continue;
      }

      if (field.type === 'radio') {
        if (field.checked && field.id !== 'einling') return true;
        continue;
      }

      if (field.tagName === 'SELECT') {
        const value = String(field.value || '').trim();
        const text = String(field.options[field.selectedIndex]?.textContent || '').trim().toLowerCase();

        if (
          value &&
          !value.startsWith('keine_') &&
          !text.startsWith('keine ') &&
          !text.startsWith('kein ') &&
          !text.includes('bitte auswählen')
        ) {
          return true;
        }
        continue;
      }

      if (String(field.value || '').trim() !== '') return true;
    }

    return false;
  }

  function refreshCardColor(card) {
    if (!card) return;

    card.classList.remove('card-empty', 'card-complete');

    if (card.hasAttribute('open')) return;

    if (cardHasRealValue(card)) {
      card.classList.add('card-complete');
    } else {
      card.classList.add('card-empty');
    }
  }

  function resetAfterClear() {
    const lebend = findCard('3_Lebendbilder');
    const einleitung = findCard('4_Einleitung');

    unlockCard(lebend);
    unlockCard(einleitung);

    document.querySelectorAll('.card').forEach(function(card){
      card.removeAttribute('open');
      refreshCardColor(card);
      const hint = card.querySelector('.toggle-hint');
      if (hint && !card.classList.contains('card-disabled')) hint.innerText = 'öffnen';
    });
  }

  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', function(){
      setTimeout(resetAfterClear, 180);
      setTimeout(resetAfterClear, 450);
    });
  }
})();
</script>
